[build]
  # base must be set to the Next.js app dir so @netlify/plugin-nextjs v5
  # correctly maps .next/static/ → /_next/static/ for static asset serving.
  # Without base, chunks are generated but served at the wrong path → 404s.
  # Each new deploy triggers a full Netlify CDN purge across all edge nodes.
  base = "apps/web"
  # cd ../.. goes from apps/web → repo root to set up workspace symlinks
  # (apps/web depends on packages/quant-engine via npm workspaces).
  # Then we come back to apps/web for the actual Next.js build.
  command = "cd ../.. && npm install && cd apps/web && npm install --os=linux --cpu=x64 --ignore-scripts=false lightningcss @tailwindcss/oxide && npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_PROJECT_ID"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Rule 1: All routes default — no CDN edge caching for HTML pages
# (This must come FIRST so more specific rules below can override it)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"

# Rule 2: Versioned static assets — cache forever in both browser and CDN
# These rules come AFTER /* so they override it for static asset paths
[[headers]]
  for = "/_next/static/chunks/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

# Rule 3: Build manifests — never cache (override the chunks/* rule)
[[headers]]
  for = "/_next/static/*/_buildManifest.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/_next/static/*/_ssgManifest.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"
