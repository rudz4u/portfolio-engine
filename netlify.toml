[build]
  command = "npm install && cd apps/web && npm install --os=linux --cpu=x64 --ignore-scripts=false lightningcss @tailwindcss/oxide && npm run build"
  publish = "apps/web/.next"

[build.environment]
  NODE_VERSION = "22"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_PROJECT_ID"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Versioned static assets (content-addressed filenames) can be cached forever
[[headers]]
  for = "/_next/static/chunks/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# Next.js build manifests must NEVER be cached — they change on every deploy
[[headers]]
  for = "/_next/static/*/_buildManifest.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_next/static/*/_ssgManifest.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# All HTML pages (SSR + static shell): never store in CDN edge cache
# This prevents Netlify Edge from serving stale HTML after a new deploy
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"
