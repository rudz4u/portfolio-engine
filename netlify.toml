[build]
  command = "npm install --no-package-lock --os=linux --cpu=x64 && npm run build --workspace=apps/web"
  publish = "apps/web/.next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_PROJECT_ID"

[[plugins]]
  package = "@netlify/plugin-nextjs"
