[build]
  command = "npm install --no-package-lock --os=linux --cpu=x64 && npm run build --workspace=apps/web"
  publish = "apps/web/.next"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_SUPABASE_ANON_KEY,SUPABASE_PROJECT_ID"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Cache headers to prevent stale JS chunk 404s after deployments
[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
