# ─────────────────────────────────────────────────────────────────────────────
# netlify.toml — Portfolio Engine (Next.js 15 on Netlify)
#
# The OpenNext adapter is auto-detected by Netlify for Next.js projects.
# Do NOT add @netlify/plugin-nextjs here — Netlify provisions the latest
# adapter automatically on every build. Pinning it opts you out of updates.
#
# Caching is managed entirely by the adapter:
#   • Static assets (_next/static/**) → immutable, 1-year CDN + browser cache
#   • SSR/ISR pages → adapter-controlled CDN cache with atomic-deploy invalidation
#   • Dynamic responses → not cached by default
#
# Skew protection (NETLIFY_NEXT_SKEW_PROTECTION) ensures that in-flight
# visitors see assets from their deployment, not a newer one. This prevents
# 404s for JS/CSS bundles after a deploy goes live.
# ─────────────────────────────────────────────────────────────────────────────

[build]
  command   = "npm run build"
  publish   = ".next"

[build.environment]
  NODE_VERSION = "20"
  # Skew protection — prevents stale JS/CSS 404s on custom domains after deploys.
  NETLIFY_NEXT_SKEW_PROTECTION = "true"
  # Upstox OAuth credentials (UPSTOX_CLIENT_SECRET set in Netlify dashboard)
  UPSTOX_CLIENT_ID    = "d462ce65-de8f-4daa-b543-f8e8ae8dc722"
  UPSTOX_REDIRECT_URI = "https://investbuddyai.com/api/oauth/upstox/callback"
  # NEXT_PUBLIC_* vars are intentionally embedded in client JS by Next.js.
  # SUPABASE_PROJECT_ID is part of the public Supabase URL.
  # The Supabase anon key is public by design — security comes from RLS policies.
  # Tell Netlify's secrets scanner to skip these expected keys.
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,NEXT_PUBLIC_SUPABASE_URL,SUPABASE_PROJECT_ID,NEXT_PUBLIC_SUPABASE_ANON_KEY"
  NEXT_PUBLIC_APP_URL = "https://investbuddyai.com"

# ── Functions ────────────────────────────────────────────────────────────────

# Default timeout for all serverless functions (Upstox sync needs ~15s)
[functions]
  node_bundler = "esbuild"

[functions."*"]
  timeout = 30

# OpenNext SSR handler — needs longer timeout for advisory scan after() callbacks
[functions."___netlify-server-handler"]
  timeout = 120

# Scheduled function — daily portfolio sync (Mon–Fri 4:30 AM UTC / 10 AM IST)
# Requires SUPABASE_SERVICE_ROLE_KEY set in Netlify dashboard
[functions."daily-sync"]
  timeout = 60

# Advisory Intelligence — 4 scheduled scans per day Mon–Fri
# Each scan: scrape advisors → extract via LLM → compute consensus → update scores
# Requires SUPABASE_SERVICE_ROLE_KEY, TAVILY_API_KEY, GEMINI_API_KEY (or OPENAI_API_KEY)
[functions."advisory-scan-morning"]
  timeout = 120

[functions."advisory-scan-midday"]
  timeout = 120

[functions."advisory-scan-afternoon"]
  timeout = 120

[functions."advisory-scan-evening"]
  timeout = 120

# ── Security headers ────────────────────────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Content-Type-Options = "nosniff"
    X-Frame-Options        = "DENY"
    Referrer-Policy        = "strict-origin-when-cross-origin"
