[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_KEYS = "NEXT_PUBLIC_SUPABASE_URL,NEXT_PUBLIC_SUPABASE_ANON_KEY,NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY,SUPABASE_PROJECT_ID"
  # Disable Next.js plugin durable cache — prevents stale HTML with 404 chunk refs
  # on direct URL navigation after a deploy. Per Netlify docs, the plugin v5.5+
  # automatically stores Next.js pages in a 1-year durable cache; atomic-deploy
  # invalidation can miss cookie/header vary buckets, breaking direct-URL loads.
  NETLIFY_NEXT_NO_DURABLE_CACHE = "true"
  # Upstox app credentials (OAuth flow)
  # UPSTOX_CLIENT_SECRET must be set in Netlify dashboard (not committed to git)
  UPSTOX_CLIENT_ID = "d462ce65-de8f-4daa-b543-f8e8ae8dc722"
  # This MUST match the redirect URI registered in the Upstox developer portal exactly.
  UPSTOX_REDIRECT_URI = "https://brokerai.rudz.in/api/oauth/upstox/callback"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Extend timeout for data-heavy API routes (default 10s; Upstox sync needs ~15s)
[functions."*"]
  timeout = 30

# Rule 1: All routes default — no CDN edge caching for HTML pages
# (This must come FIRST so more specific rules below can override it)
[[headers]]
  for = "/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"
    X-Content-Type-Options = "nosniff"

# Rule 2: Versioned static assets — cache forever in both browser and CDN
# These rules come AFTER /* so they override it for static asset paths
[[headers]]
  for = "/_next/static/chunks/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/css/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/_next/static/media/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Netlify-CDN-Cache-Control = "public, max-age=31536000, immutable"

# Rule 3: Build manifests — never cache (override the chunks/* rule)
[[headers]]
  for = "/_next/static/*/_buildManifest.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"

[[headers]]
  for = "/_next/static/*/_ssgManifest.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
    Netlify-CDN-Cache-Control = "no-store"
