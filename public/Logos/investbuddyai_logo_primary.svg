<svg width="1200" height="320" viewBox="0 0 1200 320" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Invest Buddy AI logo">
  <defs>
    <linearGradient id="bgGlow" x1="40" y1="40" x2="260" y2="260" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1E1B4B"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>

    <linearGradient id="orbStroke" x1="56" y1="44" x2="244" y2="244" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#A78BFA"/>
      <stop offset="0.52" stop-color="#38BDF8"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>

    <linearGradient id="nodeFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#E9D5FF"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>

    <linearGradient id="arrowFill" x1="120" y1="180" x2="196" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#34D399"/>
      <stop offset="1" stop-color="#86EFAC"/>
    </linearGradient>

    <linearGradient id="textGrad" x1="348" y1="88" x2="720" y2="248" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="0.55" stop-color="#D8B4FE"/>
      <stop offset="1" stop-color="#7DD3FC"/>
    </linearGradient>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="ringGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="320" rx="32" fill="#020617"/>

  <g transform="translate(28 28)">
    <circle cx="144" cy="132" r="108" fill="url(#bgGlow)"/>
    <circle cx="144" cy="132" r="96" stroke="url(#orbStroke)" stroke-width="8" opacity="0.95" filter="url(#ringGlow)"/>
    <circle cx="144" cy="132" r="70" stroke="#8B5CF6" stroke-opacity="0.18" stroke-width="1.5"/>
    <circle cx="144" cy="132" r="46" stroke="#38BDF8" stroke-opacity="0.18" stroke-width="1.5"/>

    <path d="M86 166L118 140L150 152L188 98L218 114" stroke="url(#orbStroke)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round" filter="url(#softGlow)"/>
    <path d="M172 92L200 92L200 120" stroke="url(#arrowFill)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M188 98L200 92" stroke="url(#arrowFill)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M188 98L200 108" stroke="url(#arrowFill)" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>

    <path d="M96 92C112 74 132 66 144 66C170 66 194 82 204 104" stroke="#A78BFA" stroke-opacity="0.55" stroke-width="4" stroke-linecap="round"/>
    <path d="M86 184C108 202 134 210 154 208C184 205 210 192 224 170" stroke="#38BDF8" stroke-opacity="0.5" stroke-width="4" stroke-linecap="round"/>

    <circle cx="86" cy="166" r="8" fill="url(#nodeFill)"/>
    <circle cx="118" cy="140" r="8" fill="url(#nodeFill)"/>
    <circle cx="150" cy="152" r="8" fill="url(#nodeFill)"/>
    <circle cx="188" cy="98" r="8" fill="url(#nodeFill)"/>
    <circle cx="218" cy="114" r="8" fill="url(#nodeFill)"/>

    <circle cx="144" cy="132" r="13" fill="#0F172A" stroke="#A78BFA" stroke-width="3"/>
    <circle cx="144" cy="132" r="5" fill="#34D399"/>
    <circle cx="144" cy="132" r="26" stroke="#A78BFA" stroke-opacity="0.22" stroke-width="2"/>
  </g>

  <g transform="translate(344 0)">
    <text x="0" y="146" fill="url(#textGrad)" font-size="74" font-weight="700" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="-1.8">InvestBuddy</text>
    <text x="2" y="210" fill="#94A3B8" font-size="34" font-weight="600" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="6">AI</text>
    <text x="72" y="210" fill="#64748B" font-size="28" font-weight="500" font-family="Inter, Segoe UI, Arial, sans-serif" letter-spacing="0.4">Portfolio Intelligence Layer</text>

    <g transform="translate(762 92)">
      <rect x="0" y="0" width="112" height="112" rx="28" fill="#0F172A" stroke="#1E293B"/>
      <circle cx="56" cy="56" r="34" stroke="#8B5CF6" stroke-width="3.2" stroke-opacity="0.9"/>
      <path d="M38 66L49 56L61 60L75 38L87 44" stroke="url(#orbStroke)" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M71 34L86 34L86 49" stroke="#86EFAC" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M75 38L86 34" stroke="#86EFAC" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M75 38L86 45" stroke="#86EFAC" stroke-width="5.5" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="38" cy="66" r="4.5" fill="#C4B5FD"/>
      <circle cx="49" cy="56" r="4.5" fill="#BAE6FD"/>
      <circle cx="61" cy="60" r="4.5" fill="#C4B5FD"/>
      <circle cx="75" cy="38" r="4.5" fill="#BAE6FD"/>
      <circle cx="87" cy="44" r="4.5" fill="#C4B5FD"/>
    </g>
  </g>
</svg>
